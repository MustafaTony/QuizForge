<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuizForge — إنشاء حساب</title>
  <link rel="stylesheet" href="css/shared.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
    .auth-card { width:100%; max-width:420px; position:relative; z-index:1; }
    .auth-card .card-body { padding:40px 36px; }
    .auth-logo { text-align:center; margin-bottom:32px; }
    .auth-logo .brand { font-family:'Cairo',sans-serif; font-size:2rem; font-weight:900; background:linear-gradient(135deg,var(--blue),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .auth-footer { text-align:center; margin-top:20px; font-size:.85rem; color:var(--text3); }
    .auth-footer a { color:var(--blue); text-decoration:none; font-weight:700; }
    .submit-btn { width:100%; margin-top:6px; padding:14px; font-size:.95rem; }
  </style>
</head>
<body>
  <div class="bg-canvas"><div class="orb"></div><div class="orb"></div></div>

  <div class="auth-card card fade-up">
    <div class="card-body">
      <div class="auth-logo">
        <div class="brand">⚡ QuizForge</div>
        <p>أنشئ حسابك الآن</p>
      </div>

      <div id="alertBox"></div>

      <div class="form-group">
        <label class="form-label" for="username">اسم المستخدم</label>
        <input class="form-control" id="username" type="text" placeholder="ahmed_99" autocomplete="username"/>
        <div class="form-error" id="usernameErr"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">البريد الإلكتروني</label>
        <input class="form-control" id="email" type="email" placeholder="example@email.com"/>
        <div class="form-error" id="emailErr"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">كلمة المرور</label>
        <input class="form-control" id="password" type="password" placeholder="6 أحرف على الأقل"/>
        <div class="form-error" id="passErr"></div>
      </div>

      <button class="btn btn-primary submit-btn" id="regBtn">إنشاء الحساب</button>

      <div class="auth-footer">
        لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    if (API.isLoggedIn()) window.location.href = 'index.html';

    const alertBox   = document.getElementById('alertBox');
    const regBtn     = document.getElementById('regBtn');

    function showAlert(msg, type = 'error') {
      alertBox.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    }
    function fieldErr(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.toggle('show', !!msg);
    }

    async function doRegister() {
      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Clear previous errors
      ['usernameErr','emailErr','passErr'].forEach(id => fieldErr(id, ''));
      alertBox.innerHTML = '';

      let valid = true;
      if (!username || username.length < 3) { fieldErr('usernameErr', 'اسم المستخدم يجب أن يكون 3 أحرف على الأقل'); valid = false; }
      if (!email || !/\S+@\S+\.\S+/.test(email)) { fieldErr('emailErr', 'يرجى إدخال بريد إلكتروني صحيح'); valid = false; }
      if (!password || password.length < 6) { fieldErr('passErr', 'كلمة المرور يجب أن تكون 6 أحرف على الأقل'); valid = false; }
      if (!valid) return;

      regBtn.disabled    = true;
      regBtn.textContent = '...جاري الإنشاء';

      try {
        const data = await API.post('/api/auth/register', { username, email, password });
        API.saveAuth(data.token, data.user);
        showAlert('تم إنشاء الحساب بنجاح! جاري التحويل...', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 1200);
      } catch (err) {
        showAlert(err.message || 'حدث خطأ أثناء إنشاء الحساب');
        regBtn.disabled    = false;
        regBtn.textContent = 'إنشاء الحساب';
      }
    }

    regBtn.addEventListener('click', doRegister);
  </script>
</body>
</html>
