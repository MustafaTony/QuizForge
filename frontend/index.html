<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuizForge — الرئيسية</title>
  <link rel="stylesheet" href="css/shared.css"/>
  <style>
    /* ── Hero ───────────────────────────────────────────── */
    .hero {
      text-align: center;
      padding: 56px 20px 40px;
      position: relative; z-index: 1;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 18px; border-radius: 30px;
      border: 1px solid rgba(79,139,255,.3);
      background: rgba(79,139,255,.1);
      color: var(--blue); font-size: .78rem;
      font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 22px;
    }
    .hero-badge::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--blue); animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%,100%{opacity:1;transform:scale(1)}
      50%{opacity:.4;transform:scale(.8)}
    }
    .hero h1 {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(2rem, 5.5vw, 3.6rem);
      font-weight: 900; line-height: 1.1;
      letter-spacing: -1px; margin-bottom: 16px;
    }
    .gradient-text {
      background: linear-gradient(135deg, var(--blue) 0%, var(--purple) 50%, var(--cyan) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      color: var(--text2); font-size: 1rem; line-height: 1.7;
      max-width: 460px; margin: 0 auto 32px;
    }
    .quick-links {
      display: flex; justify-content: center; gap: 10px;
      flex-wrap: wrap; margin-bottom: 48px;
    }

    /* ── Subject cards ──────────────────────────────────── */
    .subjects-section {
      position: relative; z-index: 1;
      padding: 0 20px 64px;
    }
    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      max-width: 820px;
      margin: 0 auto;
    }
    .subject-card {
      text-decoration: none; color: var(--text);
      padding: 36px 20px 28px;
      border-radius: var(--r-lg);
      background: var(--surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
      position: relative; overflow: hidden;
      transition: var(--t);
      animation: fadeUp .5s ease both;
    }
    .subject-card:nth-child(1) { animation-delay: .05s; }
    .subject-card:nth-child(2) { animation-delay: .12s; }
    .subject-card:nth-child(3) { animation-delay: .19s; }

    /* colored top bar on hover */
    .subject-card::after {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: var(--card-c, var(--blue));
      transform: scaleX(0);
      transition: transform var(--t);
    }
    .subject-card:hover {
      transform: translateY(-7px);
      border-color: var(--card-c, var(--blue));
      box-shadow: 0 20px 50px rgba(0,0,0,.35),
                  0 0 0 1px var(--card-c, var(--blue));
    }
    .subject-card:hover::after { transform: scaleX(1); }

    /* per-subject accent colors */
    .subject-card[data-subject="html"]       { --card-c: #f97316; }
    .subject-card[data-subject="css"]        { --card-c: #3b82f6; }
    .subject-card[data-subject="javascript"] { --card-c: #eab308; }

    .subject-icon-wrap {
      width: 76px; height: 76px; border-radius: 22px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; transition: var(--t);
    }
    .subject-card:hover .subject-icon-wrap {
      transform: scale(1.12) rotate(-6deg);
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
    }

    .subject-card-title {
      font-family: 'Cairo', sans-serif;
      font-size: 1.18rem; font-weight: 900;
    }
    .subject-card-desc {
      font-size: .8rem; color: var(--text3);
    }
    .subject-card-count {
      display: inline-flex; align-items: center;
      font-size: .74rem; font-weight: 700;
      color: var(--card-c, var(--blue));
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      padding: 4px 14px; border-radius: 20px;
    }

    @media (max-width: 640px) {
      .subjects-grid { grid-template-columns: 1fr; }
      .hero { padding: 40px 16px 28px; }
    }
    @media (max-width: 900px) and (min-width: 641px) {
      .subjects-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>



  <!-- Hero -->
  <div class="hero fade-up">
    <div class="hero-badge">⚡ اختبر نفسك</div>
    <h1>
      <span class="gradient-text">QuizForge</span><br>
      بناء مهارات الويب
    </h1>
    <p>اختر موضوعاً وتحدى نفسك بأسئلة مدروسة<br>مع مؤقت وتحليل فوري لأدائك</p>
    <div class="quick-links">
      <a class="btn btn-ghost" href="search.html">🔍 البحث في الأسئلة</a>
      <a class="btn btn-ghost" href="leaderboard.html">🏆 المتصدرون</a>
    </div>
  </div>

  <!-- Subject cards — correct RTL order: HTML → CSS → JavaScript -->
  <div class="subjects-section">
    <div class="subjects-grid">

      <a class="subject-card" data-subject="html" href="quiz.html?subject=html">
        <div class="subject-icon-wrap">🧱</div>
        <div class="subject-card-title">HTML</div>
        <div class="subject-card-desc">البنية والدلالات</div>
        <div class="subject-card-count" id="cnt-html">12 سؤال</div>
      </a>

      <a class="subject-card" data-subject="css" href="quiz.html?subject=css">
        <div class="subject-icon-wrap">🎨</div>
        <div class="subject-card-title">CSS</div>
        <div class="subject-card-desc">التصميم والتخطيط</div>
        <div class="subject-card-count" id="cnt-css">12 سؤال</div>
      </a>

      <a class="subject-card" data-subject="javascript" href="quiz.html?subject=javascript">
        <div class="subject-icon-wrap">⚡</div>
        <div class="subject-card-title">JavaScript</div>
        <div class="subject-card-desc">المنطق والتفاعل</div>
        <div class="subject-card-count" id="cnt-javascript">12 سؤال</div>
      </a>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script>
    // Pull live counts from backend (fails silently on Live Server without backend)
    (async () => {
      try {
        const data = await API.get('/api/questions');
        Object.entries(data.counts || {}).forEach(([sub, count]) => {
          const el = document.getElementById('cnt-' + sub);
          if (el) el.textContent = count + ' سؤال';
        });
      } catch (_) { /* backend offline — default counts still shown */ }
    })();
  </script>
</body>
</html>
